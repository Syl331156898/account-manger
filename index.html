<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="账号管理" />
  <title>账号管理</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="style.css" />
  <script>
    if ('serviceWorker' in navigator) {
      // 强制每次都重新检查 sw.js（绕过 HTTP 缓存）
      navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' }).then(reg => {
        // 已有 waiting 的新 SW
        if (reg.waiting) reg.waiting.postMessage('skipWaiting')

        // 主动触发检查更新
        reg.update()

        reg.addEventListener('updatefound', () => {
          const newSW = reg.installing
          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              newSW.postMessage('skipWaiting')
            }
          })
        })
      })

      let refreshing = false
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!refreshing) { refreshing = true; window.location.reload() }
      })
    }
  </script>
</head>
<body>
  <!-- 启动屏 -->
  <div id="splash" style="position:fixed;inset:0;background:#f8fafc;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s ease;">
    <div style="font-size:48px;margin-bottom:16px;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.1));">📋</div>
    <div style="font-size:22px;font-weight:700;color:#0f172a;letter-spacing:0.5px;">账号管理</div>
    <div style="font-size:14px;color:#64748b;margin-top:12px;font-weight:500;">加载中...</div>
  </div>

  <!-- 底部导航 -->
  <nav class="tab-bar">
    <div class="tab-item active" data-tab="list" onclick="switchTab('list')">
      <div class="tab-icon-wrap">
        <svg class="tab-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      </div>
      <span class="tab-label">账号列表</span>
    </div>
    <div class="tab-item" data-tab="generator" onclick="switchTab('generator')">
      <div class="tab-icon-wrap">
        <svg class="tab-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </div>
      <span class="tab-label">生成账号</span>
    </div>
    <div class="tab-item" data-tab="sync" onclick="switchTab('sync')">
      <div class="tab-icon-wrap">
        <svg class="tab-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      </div>
      <span class="tab-label">云同步</span>
    </div>
  </nav>

  <!-- 账号列表页 -->
  <div id="page-list" class="page active">
    <div class="nav-bar">
      <span class="nav-title">账号列表</span>
      <button onclick="forceRefresh()" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:#007AFF; font-size:14px; cursor:pointer;">更新代码</button>
    </div>
    <!-- 平台切换 -->
    <div class="plat-switch">
      <div id="plat-kiro" class="seg-item active" onclick="switchPlatform('kiro')">Kiro</div>
      <div id="plat-trae" class="seg-item" onclick="switchPlatform('trae')">Trae</div>
    </div>
    <!-- 注册状态分栏 -->
    <div class="seg-control">
      <div class="seg-item active" id="seg-unregistered" onclick="switchSeg('unregistered')">未注册</div>
      <div class="seg-item" id="seg-registered" onclick="switchSeg('registered')">已注册</div>
      <div class="seg-item" id="seg-sold" onclick="switchSeg('sold')">号已出</div>
    </div>
    <div id="tagFilter" class="tag-scroll"></div>
    <div id="pullRefreshIndicator" class="pull-indicator">
      <svg id="pullArrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      <span id="pullRefreshText">下拉获取云端数据</span>
    </div>
    <div id="accountList" class="list-container"></div>
  </div>

  <!-- 生成账号页 -->
  <div id="page-generator" class="page">
    <div class="nav-bar">
      <span class="nav-title">生成账号</span>
      <button onclick="forceRefresh()" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:#007AFF; font-size:14px; cursor:pointer;">更新代码</button>
    </div>
    <!-- 平台分栏 -->
    <div class="seg-control">
      <div class="seg-item active" id="gen-seg-duck" onclick="switchGenSeg('duck')">Duck邮箱</div>
      <div class="seg-item" id="gen-seg-github" onclick="switchGenSeg('github')">GitHub</div>
    </div>
    <div class="page-content">

      <!-- 预览 -->
      <div class="card">
        <div class="section-title">预览（姓名、密码自动随机生成）</div>
        <div id="previewContent"></div>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button class="btn-outline" style="flex:1;margin-top:0" onclick="refreshPreview()">换一个</button>
          <button class="btn-outline" style="flex:1;margin-top:0;color:#34c759;border-color:#34c759" onclick="doSaveSingle()">保存账号</button>
        </div>
      </div>


    </div>
  </div>

  <!-- 云同步页 -->
  <div id="page-sync" class="page">
    <div class="nav-bar">
      <span class="nav-title">云同步设置</span>
      <button onclick="forceRefresh()" style="position:absolute; right:16px; top:50%; transform:translateY(-50%); background:none; border:none; color:#007AFF; font-size:14px; cursor:pointer;">更新代码</button>
    </div>
    <div class="page-content">
      <div class="card">
        <div class="section-title">GitHub Gist 凭证</div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
          <span style="font-size: 13px; color: #666; width: 60px;">Token</span>
          <input type="text" id="syncToken" class="info-input" placeholder="输入 GitHub Token" />
          <button class="inline-copy" onclick="copyText(document.getElementById('syncToken').value, 'Token')">复制</button>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
          <span style="font-size: 13px; color: #666; width: 60px;">Gist ID</span>
          <input type="text" id="syncGistId" class="info-input" placeholder="输入 Gist ID" />
          <button class="inline-copy" onclick="copyText(document.getElementById('syncGistId').value, 'Gist ID')">复制</button>
        </div>
        <button class="btn-outline" onclick="saveSyncConfig()" style="margin-top:10px">保存凭证</button>
      </div>

      <div class="card">
        <div class="section-title">手动同步操作</div>
        <button class="btn-outline" onclick="syncFromCloud()" style="margin-bottom:10px; color: #007AFF; border-color: #007AFF;">⬇ 拉取云端数据 (覆盖本地)</button>
        <button class="btn-outline" onclick="syncToCloud()" style="margin-bottom:10px; color: #FF3B30; border-color: #FF3B30;">⬆ 上传本地数据 (覆盖云端)</button>
      </div>
      
      <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; font-size:14px; color:#333;">
          <span style="flex:1; padding-right:10px;">发生修改时自动上传云端备份</span>
          <input type="checkbox" id="autoSyncCheckbox" style="width:20px;height:20px;accent-color:#007AFF" onchange="saveAutoSync(this.checked)" checked />
        </div>
      </div>

      <div id="appVersion" style="text-align:center;padding:16px 0;font-size:12px;color:#bbb;">当前版本 V1.1.1</div>
    </div>
  </div>

  <!-- 详情弹窗 -->
  <div id="detailModal" class="modal hidden">
    <div class="modal-mask" onclick="closeDetail()"></div>
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">账号详情</span>
        <span class="modal-close" onclick="closeDetail()">✕</span>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
